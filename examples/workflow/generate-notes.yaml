# Frank AI — Generate Notebooks & Memos
#
# Drop this workflow into any R&D project to auto-generate research notebooks
# and insight memos from git commits using the frank CLI.
#
# Setup:
#   1. Copy this file to .github/workflows/generate-notes.yaml in your project
#   2. Set required secrets:
#      - GH_PAT: GitHub PAT with repo scope (to push to lab-work repo)
#      - ANTHROPIC_API_KEY or OPENAI_API_KEY or OPENROUTER_API_KEY
#   3. (Optional) Set repository variables:
#      - FRANK_LLM_PROVIDER: openai, anthropic, ollama, or openrouter (default: anthropic)
#      - FRANK_LLM_MODEL: model name (uses provider default if empty)
#   4. Edit the OUTPUT_REPO and output directory paths below to match your setup
#   5. Run once manually to bootstrap the state DB cache

name: Generate Notes

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      content_type:
        description: 'What to generate'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - notebooks
          - memos

env:
  FRANK_VERSION: 'latest'  # Pin to a specific version (e.g., v0.1.0) for reproducibility
  FRANK_REPO: 'frankenstein-ai/frank-blog-content-creation'
  OUTPUT_REPO: 'frankenstein-ai/lab-work'  # Repository where notebooks and memos are committed
  NOTEBOOKS_DIR: 'notebooks'               # Directory in OUTPUT_REPO for notebooks
  MEMOS_DIR: 'insight_memos'               # Directory in OUTPUT_REPO for memos

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for commit analysis

      - name: Checkout output repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OUTPUT_REPO }}
          path: output-repo
          token: ${{ secrets.GH_PAT }}

      - name: Install frank CLI
        run: |
          if [ "$FRANK_VERSION" = "latest" ]; then
            gh release download --repo "$FRANK_REPO" --pattern 'frank_*_linux_amd64.tar.gz' --output frank.tar.gz
          else
            gh release download "$FRANK_VERSION" --repo "$FRANK_REPO" --pattern 'frank_*_linux_amd64.tar.gz' --output frank.tar.gz
          fi
          tar -xzf frank.tar.gz frank
          chmod +x frank
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Restore state DB
        uses: actions/cache@v4
        with:
          path: .frank-state.db
          key: frank-state-${{ github.repository }}-${{ github.run_id }}
          restore-keys: frank-state-${{ github.repository }}-

      - name: Generate notebooks
        if: inputs.content_type == 'all' || inputs.content_type == 'notebooks' || inputs.content_type == ''
        run: |
          ./frank generate notebooks \
            --source-repo . \
            --output-dir ./output-repo/${{ env.NOTEBOOKS_DIR }} \
            --period week
        env:
          FRANK_LLM_PROVIDER: ${{ vars.FRANK_LLM_PROVIDER || 'anthropic' }}
          FRANK_LLM_MODEL: ${{ vars.FRANK_LLM_MODEL || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Generate memos
        if: inputs.content_type == 'all' || inputs.content_type == 'memos' || inputs.content_type == ''
        run: |
          ./frank generate memos \
            --source-repo . \
            --output-dir ./output-repo/${{ env.MEMOS_DIR }}
        env:
          FRANK_LLM_PROVIDER: ${{ vars.FRANK_LLM_PROVIDER || 'anthropic' }}
          FRANK_LLM_MODEL: ${{ vars.FRANK_LLM_MODEL || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit and push output
        run: |
          cd output-repo
          git config user.name "frank-bot"
          git config user.email "frank-bot@frankenstein-ai.github.io"
          git add -A
          git diff --staged --quiet || git commit -m "Auto-generate notebooks and memos from ${{ github.repository }} [skip ci]"
          git push
