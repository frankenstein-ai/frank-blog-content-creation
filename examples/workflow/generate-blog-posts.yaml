# Example GitHub Actions workflow for frank blog post generation.
# Drop this into your project's .github/workflows/ directory.
#
# Prerequisites:
#   - Secret: GH_PAT (GitHub PAT with repo access + models:read scope)
#   - No local setup needed — the workflow handles initialization automatically.
#   - The default LLM provider is GitHub Models (free tier) — no paid API keys needed.
#
# See all available inputs and secrets at:
#   https://github.com/frankenstein-ai/frank-blog-content-generator/blob/main/.github/workflows/generate-reusable.yaml

name: Generate Blog Posts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  blog:
    uses: frankenstein-ai/frank-blog-content-generator/.github/workflows/generate-reusable.yaml@main
    with:
      blog-repo: your-org/your-blog
      # start-commit: ''               # default: HEAD (first run generates nothing)
      # period: week                    # default: week
      # frank-version: v0.3.0           # default: latest
      # llm-provider: github            # default: github (free tier)
      # llm-model: ''                   # default: provider default
      skill-urls: |
        humanizer=https://raw.githubusercontent.com/blader/humanizer/main/SKILL.md
    secrets:
      gh-pat: ${{ secrets.GH_PAT }}
      # anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      # openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      # openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
