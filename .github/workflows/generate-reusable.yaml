name: Generate Blog Posts (Reusable)

on:
  workflow_call:
    inputs:
      blog-repo:
        description: 'GitHub repository for the Hugo blog (e.g., org/blog)'
        required: true
        type: string
      period:
        description: 'Commit grouping period: day or week'
        required: false
        default: 'week'
        type: string
      frank-version:
        description: 'Frank CLI version tag (e.g., v0.3.0) or "latest"'
        required: false
        default: 'latest'
        type: string
      llm-provider:
        description: 'LLM provider: github, anthropic, openai, or openrouter'
        required: false
        default: 'github'
        type: string
      llm-model:
        description: 'LLM model name (provider-specific, empty for default)'
        required: false
        default: ''
        type: string
      commit-message:
        description: 'Git commit message for blog updates'
        required: false
        default: 'Auto-generate blog posts'
        type: string
      start-commit:
        description: 'Commit hash to start from on first run (empty = HEAD, no posts on first run)'
        required: false
        default: ''
        type: string
      skill-urls:
        description: 'Newline-separated skill=url pairs (e.g., humanizer=https://example.com/SKILL.md)'
        required: false
        default: ''
        type: string
      temperature:
        description: 'LLM temperature: empty/0 for defaults, positive value to override, -1 to omit (let model decide)'
        required: false
        default: ''
        type: string
    secrets:
      gh-pat:
        description: 'GitHub PAT with repo access and models:read scope'
        required: true
      anthropic-api-key:
        description: 'Anthropic API key (required if llm-provider is anthropic)'
        required: false
      openai-api-key:
        description: 'OpenAI API key (required if llm-provider is openai)'
        required: false
      openrouter-api-key:
        description: 'OpenRouter API key (required if llm-provider is openrouter)'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FRANK_HUGO_DIR: ./blog
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.gh-pat }}

      - name: Checkout blog
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.blog-repo }}
          path: blog
          token: ${{ secrets.gh-pat }}

      - name: Download frank CLI
        run: |
          if [ "${{ inputs.frank-version }}" = "latest" ]; then
            gh release download --repo frankenstein-ai/frank-blog-content-creation \
              --pattern 'frank_*_linux_amd64.tar.gz' --output frank.tar.gz
          else
            gh release download "${{ inputs.frank-version }}" \
              --repo frankenstein-ai/frank-blog-content-creation \
              --pattern 'frank_*_linux_amd64.tar.gz' --output frank.tar.gz
          fi
          tar xzf frank.tar.gz frank
          chmod +x frank
        env:
          GH_TOKEN: ${{ secrets.gh-pat }}

      - name: Verify frank CLI
        run: ./frank --version

      - name: Auto-initialize state
        run: |
          if [ ! -f .frank-state.db ]; then
            echo "No state DB found — initializing..."
            if [ -n "$START_COMMIT" ]; then
              echo "Setting start commit to $START_COMMIT"
              ./frank status update --commit "$START_COMMIT"
            else
              HEAD=$(git rev-parse HEAD)
              echo "Setting baseline to HEAD ($HEAD) — first run generates nothing"
              ./frank status update --commit "$HEAD"
            fi
          else
            echo "State DB found in repo"
          fi
        env:
          START_COMMIT: ${{ inputs.start-commit }}

      - name: Download skills
        if: inputs.skill-urls != ''
        run: |
          mkdir -p skills
          SKILLS=""
          while IFS='=' read -r name url; do
            name=$(echo "$name" | xargs)
            url=$(echo "$url" | xargs)
            [ -z "$name" ] || [ -z "$url" ] && continue
            SKILLS="${SKILLS:+$SKILLS, }\"$name\""
            echo "skill_url_$name = \"$url\"" >> .frank.toml
          done <<< "$SKILL_URLS"
          echo "skills = [$SKILLS]" >> .frank.toml
          while IFS='=' read -r name url; do
            name=$(echo "$name" | xargs)
            [ -z "$name" ] && continue
            echo "Downloading skill: $name"
            ./frank update skill "$name"
          done <<< "$SKILL_URLS"
        env:
          SKILL_URLS: ${{ inputs.skill-urls }}

      - name: Generate blog posts
        run: ./frank generate blog-posts --period ${{ inputs.period }}
        env:
          FRANK_LLM_PROVIDER: ${{ inputs.llm-provider }}
          FRANK_LLM_MODEL: ${{ inputs.llm-model }}
          FRANK_LLM_TEMPERATURE: ${{ inputs.temperature }}
          GITHUB_TOKEN: ${{ secrets.gh-pat }}
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
          OPENAI_API_KEY: ${{ secrets.openai-api-key }}
          OPENROUTER_API_KEY: ${{ secrets.openrouter-api-key }}

      - name: Update menu and homepage
        run: |
          ./frank update menu
          ./frank update home
        env:
          FRANK_LLM_PROVIDER: ${{ inputs.llm-provider }}
          FRANK_LLM_MODEL: ${{ inputs.llm-model }}
          FRANK_LLM_TEMPERATURE: ${{ inputs.temperature }}
          GITHUB_TOKEN: ${{ secrets.gh-pat }}
          ANTHROPIC_API_KEY: ${{ secrets.anthropic-api-key }}
          OPENAI_API_KEY: ${{ secrets.openai-api-key }}
          OPENROUTER_API_KEY: ${{ secrets.openrouter-api-key }}

      - name: Commit and push blog
        run: |
          cd blog
          git config user.name "frank-bot"
          git config user.email "frank-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "${{ inputs.commit-message }}"
          git push

      - name: Commit state DB
        run: |
          git config user.name "frank-bot"
          git config user.email "frank-bot@users.noreply.github.com"
          git add -f .frank-state.db
          git diff --staged --quiet || git commit -m "chore: update frank state [skip ci]"
          git push
